name: CI Basic Checks

on:
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

# Limit expensive runs & unnecessary checks by:
# - Only running on PRs (and via manual dispatch)
# - Ignoring docs translations and other non-code changes
jobs:
  php-lint:
    name: PHP - Syntax check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
      - name: Find PHP files
        if: github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch'
        run: |
          echo "Looking for PHP files..."
          files=$(find . -type f -name '*.php' -not -path './vendor/*' -not -path './node_modules/*') || true
          echo "$files" | wc -l
      - name: PHP Lint
        run: |
          set -e
          find . -type f -name "*.php" -not -path './vendor/*' -not -path './node_modules/*' -print0 | xargs -0 -n1 php -l || true

  node-tests:
    name: Node - Optional Tests
    runs-on: ubuntu-latest
    needs: php-lint
    steps:
      - uses: actions/checkout@v4
      - name: Node: Check package.json
        run: |
          if [ ! -f package.json ]; then echo 'No package.json - skipping Node tests'; exit 0; fi
      - name: Setup Node
        if: "-f package.json"
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install & Run NPM Test
        if: "-f package.json"
        run: |
          npm ci
          npm test

  eslint:
    name: ESLint (optional)
    runs-on: ubuntu-latest
    needs: php-lint
    steps:
      - uses: actions/checkout@v4
      - name: Node: Check package.json
        run: |
          if [ ! -f package.json ]; then echo 'No package.json - skipping ESLint'; exit 0; fi
      - name: Setup Node
        if: "-f package.json"
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Run ESLint
        if: "-f package.json"
        run: |
          concurrency:
            group: ci-basic
            cancel-in-progress: true

          defaults:
            run:
              shell: bash

          # Ignore changes that should not trigger CI runs, which helps reduce Action minutes
          # We still run the workflow for PRs and manual dispatch; this avoids running on doc changes
          # Note: `paths-ignore` needs to be specified at root of the workflow `on` configuration

          npm ci
          if [ -f .eslintrc.json ] || [ -f .eslintrc.js ]; then
            npx eslint . || true
          else
            echo "No eslint config found - skipping"
          fi
