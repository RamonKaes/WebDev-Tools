name: CI

on:
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Allow manual trigger from GitHub UI

jobs:
  php-tests:
    name: Run PHP checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Show PHP version
        run: php -v

      - name: Run tests (CLI)
        run: php tests/run.php

  static-analysis:
    name: Static analysis (no Composer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP 8.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Run lightweight checks (bin/check)
        run: |
          chmod +x ./bin/check
          ./bin/check
